<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>

    <div class="dropdown">
        <div class="dropdown-btn">Select Skills</div>

        <div class="dropdown-content">

            <!-- div behaves like block element -->
            <div class="option">
                <label>
                    <input type="checkbox" value="React"> React
                </label>
            </div>

            <div class="option">
                <label>
                    <input type="checkbox" value="Vue"> Vue
                </label>
            </div>

            <div class="option">
                <label>
                    <input type="checkbox" value="Angular"> Angular
                </label>
            </div>

            <div class="option">
                <label>
                    <input type="checkbox" value="Svelte"> Svelte
                </label>
            </div>
        </div>
    </div>
    <script src="script.js" defer></script>
</body>

</html>
