<!DOCTYPE html>
<html lang="en">

<body>

    <div class="">

        <p>you have hold ctrl key to select multiple here..</p>

        <label for="pet-select">Choose a pet:</label>

        <select multiple name="pets" id="pet-select" class="select-container">

            <option value="hamster">Hamster</option>

            <option value="goldfish">Goldfish</option>
        </select>

        <button class="get-all">Get all</button>

    </div>
    <script src="script.js" defer></script>
